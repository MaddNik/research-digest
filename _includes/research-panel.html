{%- comment -%} Right-sidebar personal lists (Bookmarked + Saved), populated by the research script.
  data-rt-cat filters to the current page category when set. {%- endcomment -%}
{%- assign panel_cat = page.category | default: '' -%}
<section id="rt-panel">
  <h2 class="panel-heading"><a href="{{ '/my-research/' | relative_url }}#bookmarked" class="rt-panel-link">Bookmarked</a> <span class="rt-count" data-rt-count="saved" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="saved" data-rt-scope="panel" data-rt-cat="{{ panel_cat }}"></div>

  <h2 class="panel-heading mt-4"><a href="{{ '/my-research/' | relative_url }}#to-read" class="rt-panel-link">To-Read</a> <span class="rt-count" data-rt-count="toread" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="toread" data-rt-scope="panel" data-rt-cat="{{ panel_cat }}"></div>
</section>
