{%- comment -%} Right-sidebar personal lists (Bookmarked + Saved), populated by the research script. {%- endcomment -%}
<section id="rt-panel">
  <h2 class="panel-heading"><a href="{{ '/my-research/' | relative_url }}#bookmarked" class="rt-panel-link">Bookmarked</a> <span class="rt-count" data-rt-count="saved" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="saved"></div>

  <h2 class="panel-heading mt-4"><a href="{{ '/my-research/' | relative_url }}#saved" class="rt-panel-link">Saved</a> <span class="rt-count" data-rt-count="toread" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="toread"></div>
</section>
