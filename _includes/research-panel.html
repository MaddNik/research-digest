{%- comment -%} Right-sidebar personal lists (To read + Saved), populated by the research script. {%- endcomment -%}
<section id="rt-panel">
  <h2 class="panel-heading">To read <span class="rt-count" data-rt-count="toread" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="toread"></div>

  <h2 class="panel-heading mt-4">Saved <span class="rt-count" data-rt-count="saved" hidden></span></h2>
  <div class="content mt-2 rt-render" data-rt-list-render="saved"></div>
</section>
