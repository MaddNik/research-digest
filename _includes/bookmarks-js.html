{%- comment -%} Personal research lists (Bookmarked + To-Read), stored in localStorage.
  Panel render targets with data-rt-scope="panel" + data-rt-cat filter to current page category.
  my-research page targets have no scope and always show everything. {%- endcomment -%}

<style>
  .paper-card .card-body { position: relative; }
  .paper-card__title { padding-right: 3.3rem; }
  .card-actions { position: absolute; top: .8rem; right: .8rem; display: inline-flex; gap: .15rem; }
  .rt-btn {
    border: 0; background: transparent; cursor: pointer;
    color: var(--text-muted-color); font-size: 1rem; line-height: 1; padding: .15rem .2rem;
  }
  .rt-btn:hover { color: var(--link-color); }
  .rt-btn.is-on[data-rt-list="saved"]   { color: #f0a500; }
  .rt-btn.is-on[data-rt-list="toread"]  { color: #4ea1d3; }

  /* Bookmark accent border — all card types globally */
  .paper-card,
  .conf-card { border-left: 3px solid transparent !important; transition: border-left-color .15s; }
  .paper-card[data-bm="saved"],
  .conf-card[data-bm="saved"]  { border-left-color: #f0a500 !important; }
  .paper-card[data-bm="toread"],
  .conf-card[data-bm="toread"] { border-left-color: #4ea1d3 !important; }

  /* Research list headings */
  .rt-group h3 {
    font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em;
    color: var(--text-muted-color); margin: .9rem 0 .2rem;
    padding-bottom: .2rem; border-bottom: 1px solid var(--main-border-color, rgba(128,128,128,.15));
  }
  .rt-group h4 {
    font-size: .7rem; font-weight: 600; color: var(--text-muted-color);
    margin: .45rem 0 .1rem .7rem; opacity: .8;
  }
  .rt-list .rt-group { margin-top: 1.2rem; }
  .rt-list .rt-empty { color: var(--text-muted-color); font-size: .88rem; }
  .rt-list li .rt-btn { font-size: .9rem; }

  /* Count badges */
  .rt-count {
    display: inline-block; min-width: 1.1em; padding: 0 .35em;
    font-size: .7rem; font-weight: 700; line-height: 1.4;
    color: #fff; background: var(--link-color); border-radius: 1rem; vertical-align: middle;
  }
  .rt-topbar-group { margin-left: auto; display: inline-flex; align-items: center; gap: 0; }
  .rt-topbar {
    position: relative; display: inline-flex; align-items: center;
    padding: .25rem .3rem; background: transparent; border: 0;
    color: var(--topbar-text-color, var(--text-color)); cursor: pointer;
  }
  .rt-topbar:hover { color: var(--link-color); }
  .rt-topbar.rt-drop-open { color: var(--link-color); }
  .rt-topbar .rt-count { position: absolute; top: -.1rem; right: -.2rem; }

  /* Paper-page action buttons */
  .paper-bm-actions { display: flex; gap: .5rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .paper-bm-btn {
    border: 1px solid var(--btn-border-color, rgba(128,128,128,.35));
    background: transparent; border-radius: .5rem; padding: .3rem .85rem; font-size: .85rem;
    display: inline-flex; align-items: center; gap: .4rem; color: var(--text-color);
    cursor: pointer; transition: border-color .12s, color .12s;
  }
  .paper-bm-btn:hover { border-color: var(--link-color); color: var(--link-color); }
  .paper-bm-btn.is-on[data-rt-list="saved"]  { border-color: #f0a500; color: #f0a500; }
  .paper-bm-btn.is-on[data-rt-list="toread"] { border-color: #4ea1d3; color: #4ea1d3; }

  /* Panel heading links */
  .rt-panel-link { color: inherit; text-decoration: none; }
  .rt-panel-link:hover { text-decoration: underline; color: var(--link-color); }

  /* Topbar dropdown */
  #rt-dropdown[hidden] { display: none; }
  #rt-dropdown {
    position: fixed; inset: 0; z-index: 1500;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding-top: 3.6rem; padding-right: .5rem;
  }
  .rt-drop-backdrop { position: absolute; inset: 0; }
  .rt-drop-panel {
    position: relative; z-index: 1;
    width: min(360px, calc(100vw - 1rem));
    max-height: min(520px, calc(100vh - 5rem));
    display: flex; flex-direction: column;
    background: var(--card-bg);
    border: 1px solid var(--main-border-color, rgba(128,128,128,.25));
    border-radius: .6rem; box-shadow: 0 8px 32px rgba(0,0,0,.25); overflow: hidden;
  }
  .rt-drop-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: .6rem 1rem; border-bottom: 1px solid var(--main-border-color, rgba(128,128,128,.2));
    flex-shrink: 0;
  }
  .rt-drop-title {
    font-size: .8rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-muted-color);
  }
  .rt-drop-viewall { font-size: .8rem; color: var(--link-color); text-decoration: none; }
  .rt-drop-viewall:hover { text-decoration: underline; }
  .rt-drop-body { overflow-y: auto; flex: 1; padding: .4rem .9rem .75rem; }
  .rt-drop-list { font-size: .87rem; }
  .rt-drop-list .rt-group h3 { font-size: .68rem; margin: .7rem 0 .15rem; }
  .rt-drop-list .rt-group h4 { font-size: .66rem; margin: .3rem 0 .08rem .5rem; }
  .rt-drop-list ul { margin: 0; padding: 0; list-style: none; }
  .rt-drop-list li { padding: .18rem 0; line-height: 1.35; display: flex; align-items: baseline; gap: .3rem; }
  .rt-drop-list li a { color: var(--text-color); text-decoration: none; flex: 1; }
  .rt-drop-list li a:hover { color: var(--link-color); text-decoration: underline; }
  .rt-drop-list .rt-btn { font-size: .8rem; flex-shrink: 0; }

  @media (max-width: 1199.98px) { .rt-desktop-note { display: none; } }
</style>

<script>
  (function () {
    var KEY = 'rt_lists';
    var MR_URL = '{{ "/my-research/" | relative_url }}';
    var TOPICS = {{ site.data.topics | jsonify }};
    var LISTS = ['toread', 'saved'];

    function load() {
      try {
        var o = JSON.parse(localStorage.getItem(KEY) || '{}');
        LISTS.forEach(function (l) { if (!o[l]) o[l] = {}; });
        return o;
      } catch (e) { return { toread: {}, saved: {} }; }
    }
    function save(o) { localStorage.setItem(KEY, JSON.stringify(o)); }
    var store = load();

    function esc(s) {
      return (s || '').replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function size(l) { return Object.keys(store[l] || {}).length; }

    function fmtTag(t) {
      return t.replace(/-/g, ' ').split(' ').map(function (w) {
        return w.length <= 4 ? w.toUpperCase() : w.charAt(0).toUpperCase() + w.slice(1);
      }).join(' ');
    }

    function updateCounts() {
      document.querySelectorAll('.rt-count').forEach(function (el) {
        var which = el.getAttribute('data-rt-count');
        var n = which === 'all' ? (size('saved') + size('toread')) : size(which);
        el.textContent = n;
        if (n > 0) { el.removeAttribute('hidden'); } else { el.setAttribute('hidden', ''); }
      });
    }

    function refreshButtons() {
      document.querySelectorAll('.rt-btn').forEach(function (b) {
        var l = b.getAttribute('data-rt-list');
        var id = b.getAttribute('data-rt-id');
        b.classList.toggle('is-on', !!(store[l] && store[l][id]));
      });
      document.querySelectorAll('.paper-card, .conf-card').forEach(function (card) {
        var btn = card.querySelector('.rt-btn[data-rt-id]');
        if (!btn) return;
        var id = btn.getAttribute('data-rt-id');
        var bm = (store.saved && store.saved[id]) ? 'saved'
               : (store.toread && store.toread[id]) ? 'toread' : '';
        if (bm) { card.setAttribute('data-bm', bm); } else { card.removeAttribute('data-bm'); }
      });
    }

    function catSection(list, catItems) {
      var iconClass = list === 'saved' ? 'bookmark' : 'book-open';
      function itemLi(it) {
        return '<li class="lh-lg"><a href="' + esc(it.url) + '">' + esc(it.title) + '</a>' +
          (it.kind && it.kind !== 'Deep Summary' && it.kind !== 'Paper'
            ? ' <span class="text-muted small">' + esc(it.kind) + '</span>' : '') +
          ' <button type="button" class="rt-btn is-on" data-rt-list="' + list +
          '" aria-label="Remove" title="Remove"' +
          ' data-rt-id="' + esc(it.url) + '" data-rt-title="' + esc(it.title) +
          '" data-rt-url="' + esc(it.url) + '" data-rt-cat="' + esc(it.cat) +
          '" data-rt-kind="' + esc(it.kind || '') +
          '" data-rt-tags="' + esc((it.tags || []).join(',')) + '">' +
          '<i class="fas fa-' + iconClass + '"></i></button></li>';
      }
      var hasTags = catItems.some(function (it) { return it.tags && it.tags.length > 0; });
      if (!hasTags) {
        var flat = '<ul class="content list-unstyled ps-0">';
        catItems.forEach(function (it) { flat += itemLi(it); });
        return flat + '</ul>';
      }
      var subGroups = {};
      var noTag = [];
      catItems.forEach(function (it) {
        var sub = it.tags && it.tags.length ? it.tags[0] : '';
        if (sub) { (subGroups[sub] = subGroups[sub] || []).push(it); } else { noTag.push(it); }
      });
      var html = '';
      if (noTag.length) {
        html += '<ul class="content list-unstyled ps-0">';
        noTag.forEach(function (it) { html += itemLi(it); });
        html += '</ul>';
      }
      Object.keys(subGroups).sort().forEach(function (sub) {
        html += '<h4>' + esc(fmtTag(sub)) + '</h4><ul class="content list-unstyled ps-0 ms-2">';
        subGroups[sub].forEach(function (it) { html += itemLi(it); });
        html += '</ul>';
      });
      return html;
    }

    function groupedHtml(list, catFilter) {
      var items = store[list] || {};
      var ids = Object.keys(items);
      if (catFilter) {
        ids = ids.filter(function (id) { return items[id].cat === catFilter; });
      }
      if (!ids.length) {
        var icon = list === 'saved' ? 'bookmark' : 'book-open';
        return catFilter
          ? '<p class="rt-empty">No ' + (list === 'saved' ? 'bookmarked' : 'to-read') + ' items in this category yet.</p>'
          : '<p class="rt-empty">Nothing yet — use the <i class="fas fa-' + icon + '"></i> on any card.</p>';
      }
      var order = TOPICS.map(function (t) { return t.key; });
      var names = {};
      TOPICS.forEach(function (t) { names[t.key] = t.name; });
      var deepIds  = ids.filter(function (id) { return items[id].kind === 'Deep Summary'; });
      var otherIds = ids.filter(function (id) { return items[id].kind !== 'Deep Summary'; });
      var catGroups = {};
      otherIds.forEach(function (id) {
        var c = items[id].cat || 'Other';
        (catGroups[c] = catGroups[c] || []).push(items[id]);
      });
      var cats = Object.keys(catGroups).sort(function (a, b) {
        var ia = order.indexOf(a); var ib = order.indexOf(b);
        if (ia < 0) ia = 999; if (ib < 0) ib = 999;
        return (ia - ib) || a.localeCompare(b);
      });
      var html = '';
      if (deepIds.length) {
        html += '<div class="rt-group"><h3>Deep Summaries</h3>';
        html += catSection(list, deepIds.map(function (id) { return items[id]; }));
        html += '</div>';
      }
      cats.forEach(function (c) {
        html += '<div class="rt-group"><h3>' + esc(names[c] || c) + '</h3>';
        html += catSection(list, catGroups[c]);
        html += '</div>';
      });
      return html;
    }

    function renderLists() {
      LISTS.forEach(function (l) {
        document.querySelectorAll('[data-rt-list-render="' + l + '"]').forEach(function (el) {
          var catFilter = (el.getAttribute('data-rt-scope') === 'panel')
            ? (el.getAttribute('data-rt-cat') || null)
            : null;
          el.classList.add('rt-list');
          el.innerHTML = groupedHtml(l, catFilter);
        });
      });
    }

    function renderAll() { refreshButtons(); updateCounts(); renderLists(); renderDropdown(); }
    window._rtRenderAll = renderAll;

    /* ── Dropdown ──────────────────────────────────────────────────────────── */
    var dropEl   = document.getElementById('rt-dropdown');
    var dropList = dropEl && dropEl.querySelector('.rt-drop-list');
    var dropTitle = dropEl && dropEl.querySelector('.rt-drop-title');
    var dropLink  = dropEl && dropEl.querySelector('.rt-drop-viewall');
    var openList  = null;

    var LABEL = { saved: 'Bookmarked', toread: 'To-Read' };
    var HASH  = { saved: '#bookmarked', toread: '#to-read' };

    function renderDropdown() {
      if (!dropEl || !openList) return;
      if (dropTitle) dropTitle.textContent = LABEL[openList] || openList;
      if (dropLink)  dropLink.href = MR_URL + (HASH[openList] || '');
      if (dropList) {
        dropList.className = 'rt-drop-list rt-list';
        dropList.innerHTML = groupedHtml(openList, null);
      }
    }

    function openDrop(list, triggerEl) {
      if (openList === list && !dropEl.hasAttribute('hidden')) { closeDrop(); return; }
      openList = list;
      renderDropdown();
      dropEl.removeAttribute('hidden');
      document.querySelectorAll('.rt-drop-trigger').forEach(function (t) { t.classList.remove('rt-drop-open'); });
      if (triggerEl) triggerEl.classList.add('rt-drop-open');
    }

    function closeDrop() {
      if (!dropEl) return;
      dropEl.setAttribute('hidden', '');
      openList = null;
      document.querySelectorAll('.rt-drop-trigger').forEach(function (t) { t.classList.remove('rt-drop-open'); });
    }

    if (dropEl) {
      dropEl.querySelector('.rt-drop-backdrop').addEventListener('click', closeDrop);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrop(); });
    }

    document.addEventListener('click', function (e) {
      var trigger = e.target.closest('.rt-drop-trigger');
      if (trigger) {
        e.preventDefault();
        openDrop(trigger.getAttribute('data-rt-drop'), trigger);
        return;
      }
      var b = e.target.closest('.rt-btn');
      if (!b) return;
      var l = b.getAttribute('data-rt-list');
      if (!l) return;
      e.preventDefault();
      e.stopPropagation();
      var id = b.getAttribute('data-rt-id');
      if (!store[l]) store[l] = {};
      if (store[l][id]) {
        delete store[l][id];
      } else {
        var other = l === 'saved' ? 'toread' : 'saved';
        if (store[other]) delete store[other][id];
        var tagsStr = b.getAttribute('data-rt-tags') || '';
        store[l][id] = {
          title: b.getAttribute('data-rt-title'),
          url:   b.getAttribute('data-rt-url'),
          cat:   b.getAttribute('data-rt-cat') || 'Other',
          kind:  b.getAttribute('data-rt-kind') || '',
          tags:  tagsStr ? tagsStr.split(',').map(function (t) { return t.trim(); }).filter(Boolean) : []
        };
      }
      save(store);
      renderAll();
    });

    renderAll();
  })();
</script>
