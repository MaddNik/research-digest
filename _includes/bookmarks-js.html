{%- comment -%} Personal research lists (Saved + To read), stored in localStorage. Card buttons, My Research page, right panel, floating button, counts. {%- endcomment -%}

<a href="{{ '/my-research/' | relative_url }}" id="bm-float" aria-label="My Research" title="My Research">
  <i class="fas fa-bookmark"></i><span class="rt-count" data-rt-count="all" hidden></span>
</a>

<style>
  .paper-card .card-body { position: relative; }
  .paper-card__title { padding-right: 3.3rem; }
  .card-actions { position: absolute; top: .8rem; right: .8rem; display: inline-flex; gap: .15rem; }
  .rt-btn {
    border: 0; background: transparent; cursor: pointer;
    color: var(--text-muted-color); font-size: 1rem; line-height: 1; padding: .15rem .2rem;
  }
  .rt-btn:hover { color: var(--link-color); }
  .rt-btn.is-on[data-rt-list="saved"] { color: #f0a500; }
  .rt-btn.is-on[data-rt-list="toread"] { color: #4ea1d3; }
  .rt-list .rt-group { margin-top: 1.2rem; }
  .rt-list .rt-empty { color: var(--text-muted-color); }
  .rt-list li .rt-btn { font-size: .9rem; }
  .rt-count {
    display: inline-block; min-width: 1.1em; padding: 0 .35em;
    font-size: .7rem; font-weight: 700; line-height: 1.4;
    color: #fff; background: #f0a500; border-radius: 1rem; vertical-align: middle;
  }
  #bm-float {
    position: fixed; left: 1.2rem; bottom: 1.2rem; z-index: 1000;
    width: 2.8rem; height: 2.8rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--card-bg); color: var(--text-color);
    box-shadow: var(--card-shadow); text-decoration: none;
  }
  #bm-float:hover { color: var(--link-color); }
  #bm-float .rt-count { position: absolute; top: -.2rem; right: -.2rem; }
  #bm-topbar .rt-count { margin-left: -.4rem; }
</style>

<script>
  (function () {
    var KEY = 'rt_lists';
    var MR_URL = '{{ "/my-research/" | relative_url }}';
    var TOPICS = {{ site.data.topics | jsonify }};
    var LISTS = ['toread', 'saved'];

    function load() {
      try {
        var o = JSON.parse(localStorage.getItem(KEY) || '{}');
        LISTS.forEach(function (l) { if (!o[l]) o[l] = {}; });
        return o;
      } catch (e) { return { toread: {}, saved: {} }; }
    }
    function save(o) { localStorage.setItem(KEY, JSON.stringify(o)); }
    var store = load();

    function esc(s) {
      return (s || '').replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function size(l) { return Object.keys(store[l] || {}).length; }

    function updateCounts() {
      document.querySelectorAll('.rt-count').forEach(function (el) {
        var which = el.getAttribute('data-rt-count');
        var n = which === 'all' ? (size('saved') + size('toread')) : size(which);
        el.textContent = n;
        if (n > 0) { el.removeAttribute('hidden'); } else { el.setAttribute('hidden', ''); }
      });
    }

    function refreshButtons() {
      document.querySelectorAll('.rt-btn').forEach(function (b) {
        var l = b.getAttribute('data-rt-list');
        var id = b.getAttribute('data-rt-id');
        b.classList.toggle('is-on', !!(store[l] && store[l][id]));
      });
    }

    function groupedHtml(list) {
      var items = store[list] || {};
      var ids = Object.keys(items);
      if (!ids.length) {
        return '<p class="rt-empty">Nothing here yet. Use the ' +
          (list === 'saved' ? 'bookmark' : 'book') + ' icon on a card.</p>';
      }
      var order = TOPICS.map(function (t) { return t.key; });
      var names = {};
      TOPICS.forEach(function (t) { names[t.key] = t.name; });
      var groups = {};
      ids.forEach(function (id) {
        var it = items[id];
        var c = it.cat || 'Other';
        (groups[c] = groups[c] || []).push(it);
      });
      var cats = Object.keys(groups).sort(function (a, b) {
        var ia = order.indexOf(a); var ib = order.indexOf(b);
        if (ia < 0) ia = 999;
        if (ib < 0) ib = 999;
        return (ia - ib) || a.localeCompare(b);
      });
      var html = '';
      cats.forEach(function (c) {
        html += '<div class="rt-group"><h3>' + esc(names[c] || c) + '</h3><ul class="content list-unstyled ps-0">';
        groups[c].forEach(function (it) {
          html += '<li class="lh-lg"><a href="' + esc(it.url) + '">' + esc(it.title) + '</a>' +
            (it.kind ? ' <span class="text-muted small">' + esc(it.kind) + '</span>' : '') +
            ' <button type="button" class="rt-btn is-on" data-rt-list="' + list + '" aria-label="Remove" title="Remove" data-rt-id="' + esc(it.url) +
            '" data-rt-title="' + esc(it.title) + '" data-rt-url="' + esc(it.url) +
            '" data-rt-cat="' + esc(it.cat) + '" data-rt-kind="' + esc(it.kind || '') +
            '"><i class="fas fa-' + (list === 'saved' ? 'bookmark' : 'book-open') + '"></i></button></li>';
        });
        html += '</ul></div>';
      });
      return html;
    }

    function renderLists() {
      var s = document.getElementById('saved-list');
      if (s) s.classList.add('rt-list'), s.innerHTML = groupedHtml('saved');
      var t = document.getElementById('toread-list');
      if (t) t.classList.add('rt-list'), t.innerHTML = groupedHtml('toread');
    }

    function renderPanel() {
      var body = document.querySelector('#bookmarks-panel .bm-panel-body');
      if (!body) return;
      var ns = size('saved'); var nt = size('toread');
      if (!ns && !nt) {
        body.innerHTML = '<p class="rt-empty">Nothing saved yet. Use the icons on a card.</p>';
        return;
      }
      body.innerHTML = '<p class="mb-1">Saved: ' + ns + ' &middot; To read: ' + nt +
        '</p><a href="' + esc(MR_URL) + '">Open My Research</a>';
    }

    function renderAll() { refreshButtons(); updateCounts(); renderLists(); renderPanel(); }

    document.addEventListener('click', function (e) {
      var b = e.target.closest('.rt-btn');
      if (!b) return;
      e.preventDefault();
      e.stopPropagation();
      var l = b.getAttribute('data-rt-list');
      var id = b.getAttribute('data-rt-id');
      if (!store[l]) store[l] = {};
      if (store[l][id]) {
        delete store[l][id];
      } else {
        store[l][id] = {
          title: b.getAttribute('data-rt-title'),
          url: b.getAttribute('data-rt-url'),
          cat: b.getAttribute('data-rt-cat') || 'Other',
          kind: b.getAttribute('data-rt-kind') || ''
        };
      }
      save(store);
      renderAll();
    });

    renderAll();
  })();
</script>
