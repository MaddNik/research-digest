{%- comment -%} The single modal overlay + its styles + behavior. Include once per page. {%- endcomment -%}
<div id="paper-modal" class="paper-modal" hidden>
  <div class="paper-modal__backdrop" data-close></div>
  <div class="paper-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="paper-modal-title">
    <button type="button" class="paper-modal__close" data-close aria-label="Close">&times;</button>
    <h2 id="paper-modal-title" class="paper-modal__title"></h2>
    <div class="paper-modal__meta text-muted small"></div>
    <div class="paper-modal__body content"></div>
    <a class="paper-modal__link btn-primary" href="#" target="_blank" rel="noopener noreferrer">Read the paper &rarr;</a>
  </div>
</div>

<script>
  (function () {
    var modal = document.getElementById('paper-modal');
    if (!modal) return;
    var titleEl = modal.querySelector('.paper-modal__title');
    var metaEl = modal.querySelector('.paper-modal__meta');
    var bodyEl = modal.querySelector('.paper-modal__body');
    var linkEl = modal.querySelector('.paper-modal__link');

    function pick(frag, sel) {
      var el = frag.querySelector(sel);
      return el ? el : null;
    }

    function openFor(id) {
      var tpl = document.getElementById(id);
      if (!tpl || !tpl.content) return;
      var frag = tpl.content.cloneNode(true);
      var t = pick(frag, '.pf-title'); titleEl.textContent = t ? t.textContent.trim() : '';
      var m = pick(frag, '.pf-meta'); metaEl.innerHTML = m ? m.innerHTML : '';
      var b = pick(frag, '.pf-body'); bodyEl.innerHTML = b ? b.innerHTML : '';
      var l = pick(frag, '.pf-link'); var href = l ? l.textContent.trim() : '';
      if (href) { linkEl.href = href; linkEl.style.display = ''; } else { linkEl.style.display = 'none'; }
      modal.hidden = false;
      document.body.classList.add('paper-modal-open');
    }

    function close() {
      modal.hidden = true;
      document.body.classList.remove('paper-modal-open');
    }

    document.addEventListener('click', function (e) {
      var trigger = e.target.closest('[data-target]');
      if (trigger) {
        var card = trigger.closest('.paper-card');
        var id = trigger.getAttribute('data-target') || (card ? card.getAttribute('data-paper-id') : null);
        if (id) { e.preventDefault(); openFor(id); }
        return;
      }
      if (e.target.closest('[data-close]')) close();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !modal.hidden) close();
    });
  })();
</script>
