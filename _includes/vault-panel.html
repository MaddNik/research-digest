{%- comment -%} Vault entry for the archive page's sidebar, after conferences. {%- endcomment -%}

{% if page.url == '/archives/' %}
  <section id="access-vault">
    <h2 class="panel-heading">Vault</h2>
    <p class="content ps-0 ms-1 mt-2 mb-2" style="font-size:.85rem;">
      Passkey-protected private documents. The session unlock expires when the tab closes.
    </p>
    <p class="ms-1 mb-0">
      <a class="btn-ghost" href="{{ '/vault/' | relative_url }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>Open Vault
      </a>
    </p>
  </section>
{% endif %}
