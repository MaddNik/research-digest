name: "Sync check"

# Durable daily consistency check for the Deep Summaries manifest vs pages.
# Runs in GitHub Actions so it does not depend on any local machine being online.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run consistency check
        id: check
        run: |
          set +e
          python3 automation/check-sync.py | tee report.txt
          echo "code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          {
            echo '### Deep Summaries sync check'
            echo ''
            echo '```'
            cat report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or refresh drift issue
        if: steps.check.outputs.code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.txt', 'utf8').trim();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'Sync drift detected in Deep Summaries';
            const body = [
              'The daily sync check found an inconsistency between `_data/summaries.yml` and the `summaries/` folders.',
              '',
              '```',
              report,
              '```',
              '',
              `See the [workflow run](${runUrl}).`,
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'sync-drift',
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['sync-drift'],
              });
            }

      - name: Fail on drift
        if: steps.check.outputs.code != '0'
        run: exit 1
