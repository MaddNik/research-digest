<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" shape-rendering="crispEdges" role="img" aria-label="Research Tracker logo">
  <!-- head: hair band on top, skin below -->
  <rect x="0" y="0" width="100" height="25" fill="#1a535c"/>
  <rect x="0" y="25" width="100" height="75" fill="#4ecdc4"/>

  <!-- subtle hair sideburns -->
  <rect x="0" y="25" width="12.5" height="12.5" fill="#1a535c"/>
  <rect x="87.5" y="25" width="12.5" height="12.5" fill="#1a535c"/>

  <!-- left eye (white outer, dark pupil inner) -->
  <rect x="12.5" y="37.5" width="12.5" height="25" fill="#ffffff"/>
  <rect x="25" y="37.5" width="12.5" height="25" fill="#14213d"/>

  <!-- right eye (dark pupil inner, white outer) -->
  <rect x="62.5" y="37.5" width="12.5" height="25" fill="#14213d"/>
  <rect x="75" y="37.5" width="12.5" height="25" fill="#ffffff"/>
</svg>
